schema_version = "1.0.0"

id = "noppers_modular_avatar_export"
version = "1.0.0"
name = "Modular Avatar Export"
tagline = "Stage avatar subset for modular export"
maintainer = "NOPPERS"

type = "add-on"

blender_version_min = "4.5.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

tags = ["Rigging", "Mesh", "Import-Export"]

description = """
Modular avatar export:
- Set specific armature and mesh
- Set specific bones
- Optionally join mesh with same target name
- Export staged in temporary scene
"""

[build]
paths_exclude_pattern = [
  "Media/",
  "tests/",
  "README.md",
]
